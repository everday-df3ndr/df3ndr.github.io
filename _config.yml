# Jekyll configuration
#markdown: redcarpet
#highlighter: pygments
markdown: kramdown
highlighter: rouge
paginate: 6
language: 'en-us'

# Website info
name: 'Everyday Defender'
description: 'Microsoft security tips and tricks on your favorite Podcast platform'

short_url: 'df3ndr.io'
google_analytics: G-QH118866XT
# disqus: username
# edit baseurl to simply '/' if using as your personal page (instead of a project page)
baseurl: ""
url: "https://df3ndr.io"

# Permalinks
permalink: /:categories/:year/:month/:day/:title.html

# Build future-dated posts.
#
# Jekyll's default is `future: false`, which excludes any post whose `date:`
# is later than the runner's `Time.now` (UTC on GitHub Actions). With
# `future: true`, every post in `_posts/` is included in every build.
#
# Important: this does NOT schedule a delayed publish — there is no
# server-side cron in Jekyll. Whatever is in `_posts/` is rendered the
# moment the build runs. The episode "release moment" is enforced by
# RSS.com's scheduled-publish and YouTube's scheduled visibility, not by
# the Jekyll `date:` field.
#
# Why this flag exists: with the default `future: false`, an episode post
# dated `+0100`/`+0200` (Amsterdam) is in the UTC future when it gets
# pushed in the morning, so Jekyll silently drops it from the build. The
# page only appears once something triggers a rebuild after the timestamp
# passes (a later push, or "Re-run all jobs"). We've hit this on multiple
# episodes; `future: true` removes the foot-gun.
future: true

# permalink: /:title
# permalink: /author/:username
# permalink: /tag/:tag

# gems and other configs
plugins:
  - jekyll-paginate

# Additional settings available on the front-matter
# Site logo in the index.html (as in demo.ghost.io)
# Author's page cover in _layouts/author.html
# The same for page.html and tag.html layouts
# Post's page cover as a per-post basis _posts/...
# Disqus comments as a per-post basis
# ...

exclude:
  - README.md
  - Rakefile
  - Gemfile
  - Gemfile.lock
  - changelog.md
  - "*.Rmd"
  - vendor
  - .travis.yml
  - node_modules
  - .git
